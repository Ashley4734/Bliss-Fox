server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Coolify / Docker health endpoint
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Static landing page fallback. This keeps direct links working if pages are added later.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for future static assets.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Basic security headers for a public marketing site.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Keep logs useful but not noisy.
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
